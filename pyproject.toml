[tool.ruff]
line-length = 120
target-version = "py312"
exclude = [
  ".git",
  ".venv",
  "venv",
  "__pycache__",
  "Cisco_EOX_Manager/front_end/node_modules",
  "Cisco_EOX_Manager/data",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["Cisco_EOX_Manager/tests"]
pythonpath = ["Cisco_EOX_Manager/backend"]
