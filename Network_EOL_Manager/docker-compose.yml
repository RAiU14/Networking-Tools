services:
  postgres:
    image: postgres:16
    container_name: net-eol-postgres
    environment:
      POSTGRES_USER: ${EOX_POSTGRES_USER:-eox_user}
      POSTGRES_PASSWORD: ${EOX_POSTGRES_PASSWORD:-eox_password}
      POSTGRES_DB: ${EOX_POSTGRES_DB:-eox_cache}
    ports:
      - "${EOX_POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - eol_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: net-eol-api
    environment:
      EOX_DATABASE_URL: ${EOX_DATABASE_URL:-postgresql+psycopg://eox_user:eox_password@postgres:5432/eox_cache}
      EOX_DATA_DIR: /product/data
      EOX_LOG_DIR: /product/logs
      EOX_SECRET_KEY: ${EOX_SECRET_KEY:-}
      EOX_API_WORKERS: ${EOX_API_WORKERS:-1}
      EOX_AUTOPOP_EXECUTION_MODE: ${EOX_AUTOPOP_EXECUTION_MODE:-local}
      EOX_AUTH_ENABLED: ${EOX_AUTH_ENABLED:-false}
      EOX_RATE_LIMIT_ENABLED: ${EOX_RATE_LIMIT_ENABLED:-true}
      EOX_RATE_LIMIT_READ_PER_MINUTE: ${EOX_RATE_LIMIT_READ_PER_MINUTE:-240}
      EOX_RATE_LIMIT_WRITE_PER_MINUTE: ${EOX_RATE_LIMIT_WRITE_PER_MINUTE:-60}
      EOX_RATE_LIMIT_AUTOPOP_JOBS_PER_HOUR: ${EOX_RATE_LIMIT_AUTOPOP_JOBS_PER_HOUR:-12}
      EOX_GRAPHQL_LIMITS_ENABLED: ${EOX_GRAPHQL_LIMITS_ENABLED:-true}
      EOX_GRAPHQL_MAX_QUERY_CHARS: ${EOX_GRAPHQL_MAX_QUERY_CHARS:-20000}
      EOX_GRAPHQL_MAX_DEPTH: ${EOX_GRAPHQL_MAX_DEPTH:-10}
      CISCO_CLIENT_ID: ${CISCO_CLIENT_ID:-}
      CISCO_CLIENT_SECRET: ${CISCO_CLIENT_SECRET:-}
      CISCO_ACCESS_TOKEN: ${CISCO_ACCESS_TOKEN:-}
      EOX_CORS_ORIGINS: ${EOX_CORS_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:5174,http://localhost:5174}
      EOX_CORS_ORIGIN_REGEX: ${EOX_CORS_ORIGIN_REGEX:-^https?://([^/:]+)(:5173|:5174)}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${EOX_API_HOST_PORT:-8000}:8000"
    volumes:
      - ./data:/product/data
      - ./logs:/product/logs

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: net-eol-worker
    profiles: ["worker"]
    command: ["python", "/product/tools/autopop_worker.py"]
    environment:
      EOX_DATABASE_URL: ${EOX_DATABASE_URL:-postgresql+psycopg://eox_user:eox_password@postgres:5432/eox_cache}
      EOX_DATA_DIR: /product/data
      EOX_LOG_DIR: /product/logs
      EOX_SECRET_KEY: ${EOX_SECRET_KEY:-}
      EOX_AUTOPOP_WORKER_POLL_SECONDS: ${EOX_AUTOPOP_WORKER_POLL_SECONDS:-5}
      CISCO_CLIENT_ID: ${CISCO_CLIENT_ID:-}
      CISCO_CLIENT_SECRET: ${CISCO_CLIENT_SECRET:-}
      CISCO_ACCESS_TOKEN: ${CISCO_ACCESS_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/product/data
      - ./logs:/product/logs

  frontend:
    build: ./front_end
    container_name: net-eol-frontend
    environment:
      VITE_API_BASE_URL: ""
    depends_on:
      - api
    ports:
      - "${EOX_FRONTEND_HOST_PORT:-5173}:5173"

volumes:
  eol_postgres_data:
